# Drop-in template for consumers of @goodwatercap/* tooling (core-frontend,
# labs). Save this file as `.github/workflows/sync-tooling.yml` in the
# consumer repo.
#
# What it does:
#   Listens for the `frontend-tooling-released` repository_dispatch event
#   (sent by goodwatercap/frontend-tooling after a release lands) and
#   delegates to the reusable workflow in this repo, which runs sync-and-pr
#   in the consumer and opens a PR.
#
# What it needs:
#   - `secrets: inherit` passes the GW CI Bot App secrets through. The
#     consumer must already have GW_CI_BOT_APP_CLIENTID,
#     GW_CI_BOT_APP_INSTALLATION_ID, and GW_CI_BOT_APP_SECRET configured
#     (used by terraform plan/apply workflows already).
#   - `packages: read` on the job so the consumer's GITHUB_TOKEN can pull
#     @goodwatercap/* from GHPR during `pnpm install`. This requires the
#     individual GHPR packages to grant Actions read access to this repo —
#     configured on the package page in github.com/orgs/goodwatercap/packages.
#   - Settings > Actions > General > "Access" on this repo must allow
#     workflows from goodwatercap/.github. If org-wide reuse is already
#     enabled, this is automatic.

name: Sync @goodwatercap tooling

on:
  repository_dispatch:
    types: [frontend-tooling-released]
  workflow_dispatch:

# Per-release branches mean concurrent runs don't clobber each other, but we
# still serialize so two `pnpm install`s don't race on the same lockfile.
concurrency:
  group: sync-tooling
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  sync:
    uses: goodwatercap/.github/.github/workflows/sync-consumer.yml@main
    secrets: inherit
